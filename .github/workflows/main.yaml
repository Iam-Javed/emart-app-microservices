# Workflow for kubekart end to end project (Docker Hub only)

name: Kubekart End to End Workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

env:
  CLIENT_IMAGE: client
  BOOKS_IMAGE: books
  MAIN_IMAGE: main

  HELM_RELEASE: kubekart
  HELM_CHART: kkartchart
  NAMESPACE: kart

jobs:

# -------------------------------------------------------
# BUILD
# -------------------------------------------------------
  Build:
    environment: Prod1
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Prepare main app config
        run: sed -i 's/localhost/emongo/g' nodeapi/config/keys.js

      - name: Build client image
        run: docker build -t client:${{ github.run_number }} ./client

      - name: Build books image
        run: docker build -t books:${{ github.run_number }} ./javaapi

      - name: Build main image
        run: docker build -t main:${{ github.run_number }} ./nodeapi

      - name: Save images
        run: |
          docker save client:${{ github.run_number }} -o client.tar
          docker save books:${{ github.run_number }}  -o books.tar
          docker save main:${{ github.run_number }}   -o main.tar

      - name: Upload images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubekart-images
          path: |
            client.tar
            books.tar
            main.tar


# -------------------------------------------------------
# PUSH  (Docker Hub only)
# -------------------------------------------------------
  Push:
    environment: Production
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: kubekart-images

      - name: Load images
        run: |
          docker load -i client.tar
          docker load -i books.tar
          docker load -i main.tar

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag and push client image
        run: |
          docker tag client:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/client:${{ github.run_number }}
          docker tag client:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/client:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/client:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/client:latest

      - name: Tag and push books image
        run: |
          docker tag books:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/books:${{ github.run_number }}
          docker tag books:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/books:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/books:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/books:latest

      - name: Tag and push main image
        run: |
          docker tag main:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/main:${{ github.run_number }}
          docker tag main:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/main:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/main:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/main:latest
